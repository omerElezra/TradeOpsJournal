name: Daily IBKR Trade Ingestion

on:
  schedule:
    # 08:00 UTC Mon–Fri (after IBKR sends overnight Activity Statements)
    - cron: "0 8 * * 1-5"
  workflow_dispatch:
    inputs:
      days_back:
        description: "How many days back to scan Gmail (e.g. 7, 30, 900)"
        required: false
        default: "5"
        type: string
      timeout_minutes:
        description: "Job timeout in minutes (use 120 for large backfills like 900 days)"
        required: false
        default: "30"
        type: string

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJSON(github.event.inputs.timeout_minutes || '30') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingestion
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          # On scheduled runs days_back is empty → script defaults to 2
          # On manual dispatch it uses whatever the user typed
          DAYS_BACK: ${{ github.event.inputs.days_back }}
        run: python scripts/ingest.py
